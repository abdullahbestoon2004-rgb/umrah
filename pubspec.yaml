name: umrah_app
description: "Umrah trip booking app"
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  google_fonts: ^6.2.1
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  supabase_flutter: ^2.15.3
  shared_preferences: ^2.3.0
  local_auth: ^2.3.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/Tawaf_Icon.png"
  adaptive_icon_background: "#0F5C4D"
  adaptive_icon_foreground: "assets/icon/Tawaf_Icon.png"

dependency_overrides:
  path_provider_android: 2.2.16

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
